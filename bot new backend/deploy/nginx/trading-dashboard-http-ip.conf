# Static dashboard (Vite dist) — HTTP on port 80, no Node needed.
# After: npm run build in trading-bot-dashboard
#
# sudo cp deploy/nginx/trading-dashboard-http-ip.conf /etc/nginx/sites-available/trading-dashboard
# sudo ln -sf /etc/nginx/sites-available/trading-dashboard /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Open: http://YOUR_SERVER_IP/
#
# API: browser hits same origin http://YOUR_SERVER_IP/api/... → proxied to FastAPI on 127.0.0.1:8000
# (avoids public :8000, CORS, and many ERR_CONNECTION_RESET from clients).
# Keep gunicorn bound to 127.0.0.1:8000 if you only expose nginx on 80.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/TRADING-BOT-WEBCREST/trading-bot-dashboard/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: cache assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
