# Static dashboard (Vite dist) — HTTP on port 80, no Node needed.
# After: npm run build in trading-bot-dashboard
#
# From repo root on VPS (note: folder name has a space):
#   sudo cp "/var/www/TRADING-BOT-WEBCREST/bot new backend/deploy/nginx/trading-dashboard-http-ip.conf" \
#     /etc/nginx/sites-available/trading-dashboard
#
# If you ALREADY have server_name 147.93.96.42; do NOT duplicate — use merge-api-location.snippet.conf
# inside that server { } (above location /). Trailing slash on proxy_pass strips /api so /api/status → /status.
#
# sudo ln -sf /etc/nginx/sites-available/trading-dashboard /etc/nginx/sites-enabled/trading-dashboard
# sudo nginx -t && sudo systemctl reload nginx
#
# Open: http://YOUR_SERVER_IP/
#
# API: browser hits same origin http://YOUR_SERVER_IP/api/... → proxied to FastAPI on 127.0.0.1:6000
# (avoids public API port, CORS, and many ERR_CONNECTION_RESET from clients).
# Keep uvicorn bound to 127.0.0.1:6000 if you only expose nginx on 80.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/TRADING-BOT-WEBCREST/trading-bot-dashboard/dist;
    index index.html;

    # ^~ stops other regex locations from stealing /api/…
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:6000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: cache assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
