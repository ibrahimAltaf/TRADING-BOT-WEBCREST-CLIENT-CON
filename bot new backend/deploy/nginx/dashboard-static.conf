# Serves Vite `dist/` and is optional if you host the UI on the same VPS.
# Build: cd trading-bot-dashboard && npm ci && npm run build
# Copy dist to e.g. /var/www/trading-dashboard/dist
#
# Set VITE_API_BASE_URL at build time to https://api.yourdomain.com

server {
    listen 443 ssl http2;
    server_name app.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/app.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.yourdomain.com/privkey.pem;

    root /var/www/trading-dashboard/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
