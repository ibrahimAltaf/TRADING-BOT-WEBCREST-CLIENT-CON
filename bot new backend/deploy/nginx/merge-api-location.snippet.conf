# Add this INSIDE the existing server { } block for 147.93.96.42 / tradingbot.webcrestllc.com
# — ABOVE any "location /" that proxy_passes to :8000 or serves the SPA.
#
# Without the trailing slash on proxy_pass, /api/status is sent to FastAPI as /api/status (404).
# With "proxy_pass http://127.0.0.1:8000/;" the /api prefix is stripped → /status (correct).

location ^~ /api/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
}
