# From this directory: docker compose up -d
# Put secrets in .env.production (same folder). Models + data persist via volumes.
services:
  trading-api:
    build: .
    container_name: trading-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      PYTHONPATH: /app
      HOST: 0.0.0.0
      PORT: "8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: ["./scripts/run_api.sh"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
