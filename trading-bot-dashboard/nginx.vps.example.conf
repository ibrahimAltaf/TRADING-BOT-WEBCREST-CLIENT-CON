# Full-site example: React `dist/` + `/api` → FastAPI (127.0.0.1:8000).
# Copy to /etc/nginx/sites-available/trading-bot, adjust paths and server_name, then:
#   sudo ln -sf /etc/nginx/sites-available/trading-bot /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Build UI on VPS:
#   cd .../trading-bot-dashboard && cp .env.vps.example .env.production && npm ci && npm run build

server {
    listen 80;
    listen [::]:80;
    # Replace with your domain, or use _ for default catch-all (IP-only access).
    server_name 147.93.96.42;

    root /var/www/trading-bot-ui/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
